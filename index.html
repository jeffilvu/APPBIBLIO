<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema BIBLIO - Full CRUD</title>
    <style>
        /* [Mantive seu CSS anterior e adicionei apenas o estilo do botão cancelar] */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #1a73e8; text-align: center; }
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-excluir { background-color: #ff4d4d; margin-left: 5px; }
        .btn-editar { background-color: #fbbc05; color: #333; }
        .livro-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 12px; }
        .info b { display: block; font-size: 1.1em; }
        .busca-input { width: 100%; border-radius: 25px; padding: 12px 20px; background: #f8f9fa; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; }
        #btn-cancelar { background-color: #9e9e9e; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 Sistema BIBLIO</h1>

        <div class="form-group">
            <input type="text" id="titulo" placeholder="Título do Livro">
            <input type="text" id="autor" placeholder="Autor">
            <button id="btn-salvar" onclick="salvarLivro()">Adicionar</button>
            <button id="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
        </div>

        <input type="text" id="campo-busca" class="busca-input" placeholder="🔍 Pesquisar...">

        <div id="lista-livros"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/livros';
        let todosOsLivros = [];
        let idLivroEmEdicao = null; // Controla se estamos editando

        async function buscarLivros() {
            const response = await fetch(API_URL);
            todosOsLivros = await response.json();
            renderizarLivros(todosOsLivros);
        }

        function renderizarLivros(lista) {
            const container = document.getElementById('lista-livros');
            container.innerHTML = '';
            lista.forEach(livro => {
                const item = document.createElement('div');
                item.className = 'livro-item';
                item.innerHTML = `
                    <div class="info"><b>${livro.titulo}</b><span>${livro.autor}</span></div>
                    <div>
                        <button class="btn-editar" onclick="prepararEdicao(${livro.id}, '${livro.titulo}', '${livro.autor}')">Editar</button>
                        <button class="btn-excluir" onclick="deletarLivro(${livro.id})">Excluir</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // --- NOVA LÓGICA DE EDIÇÃO ---

        function prepararEdicao(id, titulo, autor) {
            idLivroEmEdicao = id;
            document.getElementById('titulo').value = titulo;
            document.getElementById('autor').value = autor;
            
            document.getElementById('btn-salvar').innerText = "Atualizar";
            document.getElementById('btn-salvar').style.backgroundColor = "#34a853";
            document.getElementById('btn-cancelar').style.display = "inline-block";
        }

        async function salvarLivro() {
            const titulo = document.getElementById('titulo').value;
            const autor = document.getElementById('autor').value;

            if (!titulo || !autor) return alert("Preencha tudo!");

            const dados = { titulo, autor };

            if (idLivroEmEdicao) {
                // Se tem ID, faz um PUT (Update)
                await fetch(`${API_URL}/${idLivroEmEdicao}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
            } else {
                // Se não tem ID, faz um POST (Create)
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
            }

            cancelarEdicao();
            buscarLivros();
        }

        function cancelarEdicao() {
            idLivroEmEdicao = null;
            document.getElementById('titulo').value = '';
            document.getElementById('autor').value = '';
            document.getElementById('btn-salvar').innerText = "Adicionar";
            document.getElementById('btn-salvar').style.backgroundColor = "#1a73e8";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        // [Busca e Delete continuam iguais]
        document.getElementById('campo-busca').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = todosOsLivros.filter(l => l.titulo.toLowerCase().includes(termo) || l.autor.toLowerCase().includes(termo));
            renderizarLivros(filtrados);
        });

        async function deletarLivro(id) {
            if (confirm("Excluir?")) { await fetch(`${API_URL}/${id}`, { method: 'DELETE' }); buscarLivros(); }
        }

        buscarLivros();
    </script>
</body>
</html>
